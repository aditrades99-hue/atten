<body class="flex flex-col min-h-screen">
<!-- Top App Bar (Modified for Login - No Navigation) -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline flex justify-between items-center px-margin-edge h-touch-target z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed">StaffTrack</span>
</div>
<div class="hidden md:flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<span class="font-label-caps text-label-caps text-on-surface-variant" id="digital-clock">00:00:00</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-touch-target pb-12">
<div class="w-full max-w-md">
<!-- Branding/Hero Section -->
<div class="mb-kiosk-gap text-center">
<div class="inline-flex items-center justify-center p-4 bg-primary-container rounded-lg mb-4 shadow-md">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="fingerprint" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background mb-2">Welcome Back</h1>
<!-- Localized Welcome Text -->
<div class="flex flex-col gap-1 mb-8">
<p class="font-body-md text-body-md text-on-surface-variant">स्वागत है (Hindi)</p>
<p class="font-body-md text-body-md text-on-surface-variant">स्वागत छ (Nepali)</p>
</div>
</div>
<!-- Login Card -->
<div class="login-card bg-surface-container p-8 rounded-none shadow-sm relative overflow-hidden">
<!-- Industrial Accent Bar -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-primary"></div>
<form class="space-y-6" onsubmit="return false;">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="email">EMAIL ADDRESS</label>
<div class="relative">
<input class="w-full bg-surface border border-outline focus:border-primary focus:ring-1 focus:ring-primary h-touch-target px-4 font-body-md text-body-md outline-none transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline" data-icon="mail">mail</span>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="password">PASSWORD</label>
<div class="relative">
<input class="w-full bg-surface border border-outline focus:border-primary focus:ring-1 focus:ring-primary h-touch-target px-4 font-body-md text-body-md outline-none transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline cursor-pointer hover:text-primary transition-colors" data-icon="visibility">visibility</span>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 border-outline rounded-none text-primary focus:ring-primary bg-surface cursor-pointer" type="checkbox"/>
<span class="font-technical-sm text-technical-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember device</span>
</label>
<a class="font-technical-sm text-technical-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<button class="w-full h-touch-target bg-primary text-on-primary font-label-caps text-label-caps flex items-center justify-center gap-2 shadow-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-100" type="submit">
                        LOGIN TO TERMINAL
                        <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Decorative Element -->
<div class="mt-margin-edge grid grid-cols-2 gap-4">
<div class="p-4 border border-outline-variant bg-surface-container-low flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="verified_user">verified_user</span>
<span class="font-technical-sm text-technical-sm text-on-surface-variant uppercase">Secure Node</span>
</div>
<div class="p-4 border border-outline-variant bg-surface-container-low flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="terminal">terminal</span>
<span class="font-technical-sm text-technical-sm text-on-surface-variant uppercase">V2.4.0-Stable</span>
</div>
</div>
</div>

<!-- Background Image / Decorative Hero - Using a bento-like visual structure -->

<div class="absolute inset-0 bg-gradient-to-l from-transparent to-background"></div>
</div>
<script>
        // Micro-interaction for digital clock
        function updateClock() {
            const clock = document.getElementById('digital-clock');
            if (clock) {
                const now = new Date();
                clock.textContent = now.toLocaleTimeString('en-US', { 
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Password visibility toggle
        const visibilityToggle = document.querySelector('[data-icon="visibility"]');
        const passwordInput = document.getElementById('password');
        
        if (visibilityToggle && passwordInput) {
            visibilityToggle.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                visibilityToggle.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
