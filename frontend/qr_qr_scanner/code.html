<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            animation: scan 3s linear infinite;
        }
        .glow-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant/10 shadow-sm w-full top-0 sticky flex justify-between items-center px-margin-mobile md:px-margin-desktop py-base z-50">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">StaffTrack</h1>
</div>
<div class="flex items-center gap-md">
<button class="flex items-center bg-surface-container-low transition-colors hover:bg-surface-container-high active:scale-95 duration-150 rounded-full px-4 py-2 gap-xs">
<span class="font-label-caps text-label-caps text-on-surface-variant">नेपाली</span>
<span class="material-symbols-outlined text-[16px]">language</span>
</button>
<div class="hidden md:block w-[1px] h-6 bg-outline-variant/30"></div>
<div class="hidden md:flex items-center gap-xs">
<span class="font-label-caps text-label-caps text-on-surface-variant">Kiosk ID: NP_01</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-lg relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-64 h-64 bg-secondary-container/30 rounded-full blur-3xl"></div>
</div>
<!-- Scanner Card -->
<div class="z-10 w-full max-w-2xl flex flex-col items-center">
<div class="text-center mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">QR उपस्थिति स्क्यानर</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                    स्क्यान गर्न आफ्नो कर्मचारी QR कोड यहाँ राख्नुहोस्
                </p>
</div>
<!-- Camera Viewfinder Section -->
<div class="relative w-full aspect-square md:aspect-video max-h-[500px] bg-surface-container-lowest rounded-3xl overflow-hidden shadow-[0_4px_20px_rgba(74,69,64,0.08)] border-4 border-surface-container">
<!-- Mock Camera Feed -->
<div class="absolute inset-0 flex items-center justify-center">
<img alt="Camera Viewfinder" class="w-full h-full object-cover grayscale-[0.2] brightness-90" data-alt="A clean, minimalist high-tech workspace background with soft morning sunlight streaming through large windows. The lighting is bright and warm, consistent with a light-mode aesthetic using cream and beige tones. In the center, a focused area suggests a high-resolution camera field of view, maintaining a professional and supported focus atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfo_vg7Kepmsj0Rxt9HLJ7XeDPMxTLYafCFf5TMpK3A7y1gGRGOZyX06AEFhZ0vfKN_MvpYQVHFn4tdJH4hh2XVjMaFfkWb_ZyGSFOoDxSad7bW2Hn80tU8Ob7Ii1ZgEE3go2zb3g8rFVRXPYO-n-1ORZveYgojba9dqtOcS4fWXsHrxku7-1YMAvhNMMPC_RMvvRt6anDyfx3OkNdFNTyKs6oZigslDK1ju-LTlF543BGFwEzluj-PCwhggyhYaz66jffXS8mN5d0"/>
</div>
<!-- Viewfinder Frame -->
<div class="absolute inset-0 flex items-center justify-center p-md">
<div class="relative w-64 h-64 md:w-72 md:h-72">
<!-- Corners -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-2xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-2xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-2xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-2xl"></div>
<!-- Scanning Line -->
<div class="scan-line absolute left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary to-transparent shadow-[0_0_15px_rgba(157,61,44,0.8)] z-20"></div>
<!-- Overlay Darkening outside scan area -->
<div class="absolute -inset-96 border-[400px] border-black/40 pointer-events-none"></div>
</div>
</div>
<!-- Status Badge -->
<div class="absolute bottom-md left-1/2 -translate-x-1/2 bg-surface/90 backdrop-blur-md px-md py-sm rounded-full border border-outline-variant/20 flex items-center gap-sm shadow-sm">
<div class="w-3 h-3 bg-secondary rounded-full glow-pulse"></div>
<span class="font-label-caps text-label-caps text-secondary tracking-widest uppercase">सक्रिय स्क्यान</span>
</div>
</div>
<!-- Actions Section -->
<div class="mt-lg w-full flex flex-col md:flex-row items-center justify-center gap-md">
<button class="w-full md:w-auto px-lg py-md bg-primary text-on-primary rounded-xl font-body-md font-bold shadow-lg hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">face</span>
                    फेस भेरिफिकेसन प्रयोग गर्नुहोस्
                </button>
<button class="w-full md:w-auto px-lg py-md bg-transparent border-2 border-secondary text-secondary rounded-xl font-body-md font-bold hover:bg-secondary/5 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">keyboard</span>
                    म्यानुअल रूपमा लगइन गर्नुहोस्
                </button>
</div>
<div class="mt-md text-on-surface-variant/60 flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">info</span>
<p class="font-label-caps text-label-caps">सहायताको लागि व्यवस्थापकलाई सम्पर्क गर्नुहोस्</p>
</div>
</div>
</main>
<!-- Bottom Nav (Hidden as per "Destination" Rule for transactional focus, but keeping structure for layout balance if needed elsewhere) -->
<!-- Suppressed for Focus Screen -->
<script>
        // Micro-interaction for scanning success simulation
        document.querySelector('.relative.w-64.h-64').addEventListener('click', function() {
            const frame = this;
            const originalColor = 'border-primary';
            const successColor = 'border-secondary';
            
            // Change corners to green
            const corners = frame.querySelectorAll('div');
            corners.forEach(c => {
                if(!c.classList.contains('scan-line')) {
                    c.style.borderColor = '#4f6443';
                }
            });
            
            // Temporary feedback
            const statusBadge = document.querySelector('.glow-pulse');
            statusBadge.style.backgroundColor = '#4f6443';
            
            setTimeout(() => {
                corners.forEach(c => {
                    if(!c.classList.contains('scan-line')) {
                        c.style.borderColor = '';
                    }
                });
                statusBadge.style.backgroundColor = '';
            }, 1000);
        });
    </script>
</body></html>
